name: Reusable Integration Test

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}-${{ inputs.component }}-${{ inputs.os }}-${{ inputs.version }}
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      component:
        description: 'Component to build and test'
        required: true
        type: string
      os:
        description: 'Operating system to run on'
        required: true
        type: string
      version:
        description: 'Framework version to test'
        required: true
        type: string
      test-filter:
        description: 'Test filter category'
        required: true
        type: string
      env-var-name:
        description: 'Environment variable name for instrumentation key'
        required: false
        type: string
        default: 'INSTRUMENTATION_KEY'
      checkout-ref:
        description: 'Git ref to checkout'
        required: false
        type: string
        default: ''
      expected-head-sha:
        description: 'Pull request head SHA approved for this run'
        required: false
        type: string
        default: ''
      pull-request-number:
        description: 'Pull request number to verify before checking out approved code'
        required: false
        type: string
        default: ''
    secrets:
      instrumentation-key:
        description: 'Instrumentation key for testing'
        required: false

jobs:
  build-and-test:
    name: Build and test ${{ inputs.component }} (${{ inputs.os }}, ${{ inputs.version }})
    runs-on: ${{ inputs.os }}
    env:
      BUILD_COMPONENT: ${{ inputs.component }}
    steps:
    # Security: When called from pull_request_target with untrusted PR code,
    # verify the approved PR head is still current before checking out the
    # commit. The checkout ref is a SHA, so later branch mutations cannot change
    # the code executed by this run.
    - name: Verify approved PR head SHA
      if: inputs.pull-request-number != '' && inputs.expected-head-sha != ''
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
        EXPECTED_HEAD_SHA: ${{ inputs.expected-head-sha }}
        PULL_REQUEST_NUMBER: ${{ inputs.pull-request-number }}
      run: |
        $ErrorActionPreference = 'Stop'

        $headers = @{
          Authorization = "Bearer ${env:GH_TOKEN}"
          Accept = "application/vnd.github+json"
          "X-GitHub-Api-Version" = "2022-11-28"
        }

        $pullRequest = Invoke-RestMethod `
          -Headers $headers `
          -Uri "https://api.github.com/repos/${env:GITHUB_REPOSITORY}/pulls/${env:PULL_REQUEST_NUMBER}"

        if ($pullRequest.head.sha -ne ${env:EXPECTED_HEAD_SHA}) {
          Write-Error "The pull request head changed from ${env:EXPECTED_HEAD_SHA} to $($pullRequest.head.sha). Re-run the workflow and approve the latest commit."
          exit 1
        }

    # The workflow uses persist-credentials: false to prevent credential theft.
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
        ref: ${{ inputs.checkout-ref }}
        show-progress: false

    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0

    - name: dotnet restore Component.proj
      run: dotnet restore build/Projects/Component.proj

    - name: dotnet build Component.proj
      run: dotnet build build/Projects/Component.proj --configuration Release --no-restore

    - name: dotnet test Component.proj
      run: dotnet test build/Projects/Component.proj --filter "CategoryName=${env:TEST_FILTER}" --framework ${env:FRAMEWORK_VERSION} --configuration Release --no-restore --no-build
      shell: pwsh
      env:
        FRAMEWORK_VERSION: ${{ inputs.version }}
        TEST_FILTER: ${{ inputs.test-filter }}
        ${{ inputs.env-var-name }}: ${{ secrets.instrumentation-key }}
