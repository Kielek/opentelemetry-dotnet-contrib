name: Pack OpenTelemetry.Instrumentation.MySqlData

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
  push:
    tags:
      - 'Instrumentation.MySqlData-*' # trigger when we create a tag with prefix "Instrumentation.MySqlData-"

jobs:
  build-test-pack:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      PROJECT: OpenTelemetry.Instrumentation.MySqlData

    strategy:
      matrix:
        os: [windows-latest]

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0 # fetching all

    - uses: actions/setup-dotnet@v3.0.3
      with:
        dotnet-version: '7.0.x'

    - name: Create GitHub Prerelease
      if: ${{ (contains(github.ref_type, '-alpha.') || contains(github.ref_type, '-beta.') || contains(github.ref_type, '-rc.')) }}
      run: gh release create ${{ github.ref_name }} --title ${{ github.ref_name }} --verify-tag ${{ github.ref_name }} --notes "See [CHANGELOG](https://github.com/Kielek/opentelemetry-dotnet-contrib/blob/${{ github.ref_name }}/src/${{env.PROJECT}}/CHANGELOG.md) for details." --prerelease
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release
      if: ${{ !(contains(github.ref_type, '-alpha.') || contains(github.ref_type, '-beta.') || contains(github.ref_type, '-rc.')) }}
      run: gh release create ${{ github.ref_name }} --title ${{ github.ref_name }} --verify-tag ${{ github.ref_name }} --notes "See [CHANGELOG](https://github.com/Kielek/opentelemetry-dotnet-contrib/blob/${{ github.ref_name }}/src/${{env.PROJECT}}/CHANGELOG.md) for details." --latest --draft
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

